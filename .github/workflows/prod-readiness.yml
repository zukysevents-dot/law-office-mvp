name: prod-readiness

# Rozsirena "prod-readiness" pipeline. Zrcadli lokalni `npm run prod-readiness`
# a pridava historii-aware secret scan (gitleaks) + SAST (semgrep) na Linux
# runneru. Cilem je NAJIT diry a shodit build - nektere gaty proto mohou byt
# zamerne cervene, dokud nejsou nalezy vyreseny nebo vedome prijaty v allowlistu.

on:
  push:
    branches: [main]
  pull_request:
  workflow_dispatch:

permissions:
  contents: read

jobs:
  # --- Baseline + automatizovane gaty (CAST A) ------------------------------
  gates:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-node@v4
        with:
          node-version: 24
          cache: npm

      - name: Install deps
        run: npm ci

      - name: Lint
        run: npm run lint

      - name: Unit tests (vc. bezpecnostnich negativnich testu)
        run: npm run test

      - name: Build
        run: npm run build
        env:
          DATABASE_URL: postgresql://ci:ci@localhost:5432/ci

      - name: Prod-readiness gaty (A1-A7)
        run: npm run prod-readiness

      - name: Upload JUnit + report
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: prod-readiness-report
          path: |
            reports/prod-readiness/junit/*.xml
            reports/prod-readiness/report.md
          if-no-files-found: warn

  # --- A3 (historie): secret scan cele git historie -------------------------
  secrets-history:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: gitleaks (repo + historie)
        uses: gitleaks/gitleaks-action@v2
        env:
          GITLEAKS_CONFIG: .gitleaks.toml

  # --- A5 (rozsireny SAST): semgrep -----------------------------------------
  sast-semgrep:
    runs-on: ubuntu-latest
    container:
      image: semgrep/semgrep
    steps:
      - uses: actions/checkout@v4

      - name: semgrep (custom pravidla)
        run: semgrep --config .semgrep.yml --error src/
